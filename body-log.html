<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BODY LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #080C0A;
    --card: #0F1510;
    --card2: #131A14;
    --border: #1E2820;
    --accent: #6DB87A;
    --accent2: #4A9A57;
    --amber: #E8C547;
    --red: #E86A47;
    --text: #E8F0E9;
    --sub: #6B7D6C;
    --dim: #3A4A3B;
    --ring-track: #1A2A1B;
    --circ: 515;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; }

  /* LOADING */
  #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:16px; }
  .spinner { width:44px; height:44px; border:3px solid var(--dim); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-txt { font-size:14px; color:var(--sub); }

  /* ERROR */
  #error-screen { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:12px; padding:20px; text-align:center; }
  .err-title { font-size:20px; font-weight:700; color:var(--red); }
  .err-msg { font-size:14px; color:var(--sub); line-height:1.7; max-width:480px; }

  /* DASHBOARD */
  #dashboard { display:none; }
  header { display:flex; align-items:center; justify-content:space-between; padding:20px 32px; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(8,12,10,0.92); backdrop-filter:blur(12px); z-index:10; }
  .logo { font-size:18px; font-weight:900; letter-spacing:-0.5px; }
  .logo span { color:var(--accent); }
  .sync-info { font-size:12px; color:var(--sub); }

  .main { padding:28px 32px; max-width:1400px; margin:0 auto; display:grid; gap:24px; }

  /* Top row */
  .top-row { display:grid; grid-template-columns:300px 1fr; gap:24px; align-items:start; }

  /* Ring card */
  .ring-card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:28px; display:flex; flex-direction:column; align-items:center; gap:18px; }
  .ring-label { font-size:11px; letter-spacing:3px; color:var(--sub); text-transform:uppercase; }
  .ring-wrap { position:relative; width:190px; height:190px; }
  .ring-wrap svg { transform:rotate(-90deg); }
  .ring-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
  .ring-weight { font-size:40px; font-weight:900; letter-spacing:-2px; line-height:1; }
  .ring-unit { font-size:13px; color:var(--sub); }
  .ring-goal { font-size:11px; color:var(--sub); margin-top:4px; }
  .ring-stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; }
  .rstat { background:var(--card2); border-radius:12px; padding:12px 14px; text-align:center; }
  .rstat-val { font-size:20px; font-weight:700; }
  .rstat-val.g { color:var(--accent); }
  .rstat-val.a { color:var(--amber); }
  .rstat-label { font-size:11px; color:var(--sub); margin-top:2px; }
  .prog-wrap { grid-column:span 2; background:var(--card2); border-radius:12px; padding:12px 14px; }
  .prog-bar-bg { height:5px; background:var(--ring-track); border-radius:4px; margin:8px 0 6px; overflow:hidden; }
  .prog-bar { height:5px; background:linear-gradient(to right,var(--accent2),var(--accent)); border-radius:4px; transition:width 1.2s cubic-bezier(.4,0,.2,1); }
  .prog-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--sub); }
  .prog-pct { text-align:center; font-size:13px; color:var(--accent); margin-top:4px; }

  /* Stat cards */
  .stats-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:22px 24px; }
  .stat-tag { font-size:11px; letter-spacing:2px; color:var(--sub); text-transform:uppercase; margin-bottom:6px; }
  .stat-val { font-size:36px; font-weight:900; letter-spacing:-2px; line-height:1.1; }
  .stat-unit { font-size:13px; color:var(--sub); font-weight:300; }
  .stat-delta { font-size:13px; margin-top:8px; }
  .stat-delta.good { color:var(--accent); }
  .stat-delta.bad { color:var(--red); }
  .stat-delta.neutral { color:var(--sub); }

  /* Charts */
  .chart-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:26px; }
  .chart-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
  .chart-title { font-size:15px; font-weight:600; }
  .chart-sub { font-size:12px; color:var(--sub); margin-top:2px; }
  .pills { display:flex; gap:6px; }
  .pill { font-size:11px; padding:4px 12px; border-radius:100px; border:1px solid var(--dim); color:var(--sub); cursor:pointer; background:none; font-family:'Outfit',sans-serif; transition:all 0.2s; }
  .pill.active { border-color:var(--accent); color:var(--accent); background:rgba(109,184,122,0.08); }
  .chart-wrap { position:relative; height:190px; }
  .charts-row { display:grid; grid-template-columns:1fr 1fr; gap:24px; }

  /* Table */
  .history-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:26px; overflow:hidden; }
  .tbl-wrap { overflow-x:auto; margin-top:14px; }
  table { width:100%; border-collapse:collapse; }
  th { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--sub); font-weight:500; padding:0 14px 10px; text-align:left; border-bottom:1px solid var(--border); }
  td { padding:12px 14px; font-size:14px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,0.02); }
  .td-w { font-weight:700; font-size:16px; }
  .td-d.down { color:var(--accent); }
  .td-d.up { color:var(--red); }
  .td-d.same { color:var(--sub); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .anim { animation:fadeUp 0.5s ease forwards; opacity:0; }
  .d1{animation-delay:.05s} .d2{animation-delay:.1s} .d3{animation-delay:.15s} .d4{animation-delay:.2s} .d5{animation-delay:.25s}

  @media(max-width:900px){
    .top-row{grid-template-columns:1fr}
    .stats-bar{grid-template-columns:1fr 1fr}
    .charts-row{grid-template-columns:1fr}
    .main{padding:16px}
    header{padding:16px 20px}
  }
  @media(max-width:500px){ .stats-bar{grid-template-columns:1fr} }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">データを読み込んでいます...</div>
</div>

<div id="error-screen">
  <div class="err-title">データの読み込みに失敗しました</div>
  <div class="err-msg" id="err-msg"></div>
</div>

<div id="dashboard">
  <header>
    <div class="logo">BODY<span>LOG</span></div>
    <div class="sync-info" id="sync-info">読み込み中...</div>
  </header>
  <div class="main">

    <div class="top-row">
      <!-- Ring -->
      <div class="ring-card anim d1">
        <div class="ring-label">目標達成度</div>
        <div class="ring-wrap">
          <svg width="190" height="190" viewBox="0 0 190 190">
            <circle cx="95" cy="95" r="78" fill="none" stroke="var(--ring-track)" stroke-width="13"/>
            <circle id="ring-arc" cx="95" cy="95" r="78" fill="none" stroke="var(--accent)" stroke-width="13"
              stroke-linecap="round" stroke-dasharray="490" stroke-dashoffset="490"
              style="transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1)"/>
          </svg>
          <div class="ring-center">
            <div class="ring-weight" id="ring-weight">—</div>
            <div class="ring-unit">kg</div>
            <div class="ring-goal">目標 90 kg</div>
          </div>
        </div>
        <div class="ring-stats">
          <div class="rstat"><div class="rstat-val g" id="lost-kg">—</div><div class="rstat-label">減量 (kg)</div></div>
          <div class="rstat"><div class="rstat-val a" id="remain-kg">—</div><div class="rstat-label">残り (kg)</div></div>
          <div class="prog-wrap">
            <div class="prog-labels"><span>開始 138kg</span><span>目標 90kg</span></div>
            <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
            <div class="prog-pct" id="prog-pct">—</div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-card anim d2">
          <div class="stat-tag">最新体重</div>
          <div class="stat-val" id="s-weight">—</div>
          <div class="stat-unit">kg</div>
          <div class="stat-delta" id="s-weight-d">—</div>
        </div>
        <div class="stat-card anim d3">
          <div class="stat-tag">歩数（直近）</div>
          <div class="stat-val" style="font-size:28px;" id="s-steps">—</div>
          <div class="stat-unit">歩</div>
          <div class="stat-delta" id="s-steps-d">—</div>
        </div>
        <div class="stat-card anim d4">
          <div class="stat-tag">血圧（最新）</div>
          <div style="display:flex;align-items:baseline;gap:4px;margin-top:4px;">
            <div class="stat-val" style="font-size:28px;" id="s-sys">—</div>
            <div class="stat-unit">/</div>
            <div class="stat-val" style="font-size:24px;" id="s-dia">—</div>
          </div>
          <div class="stat-unit">mmHg</div>
          <div class="stat-delta" id="s-bp-comment">—</div>
        </div>
      </div>
    </div>

    <!-- Weight chart -->
    <div class="chart-card anim d3">
      <div class="chart-head">
        <div><div class="chart-title">体重の推移</div><div class="chart-sub">目標ライン 90kg</div></div>
        <div class="pills" id="weight-pills">
          <button class="pill active" data-d="30">30日</button>
          <button class="pill" data-d="90">3ヶ月</button>
          <button class="pill" data-d="180">6ヶ月</button>
          <button class="pill" data-d="0">全期間</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
    </div>

    <!-- Steps + BP -->
    <div class="charts-row">
      <div class="chart-card anim d4">
        <div class="chart-head"><div><div class="chart-title">歩数</div><div class="chart-sub">直近30日</div></div></div>
        <div class="chart-wrap"><canvas id="stepsChart"></canvas></div>
      </div>
      <div class="chart-card anim d4">
        <div class="chart-head"><div><div class="chart-title">血圧の推移</div><div class="chart-sub">最高 / 最低</div></div></div>
        <div class="chart-wrap"><canvas id="bpChart"></canvas></div>
      </div>
    </div>

    <!-- History -->
    <div class="history-card anim d5">
      <div class="chart-head"><div><div class="chart-title">記録履歴（直近50件）</div></div></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>日付</th><th>体重 (kg)</th><th>前日比</th><th>歩数</th><th>血圧</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxD77c6R38hE7ViqwD_DTnW7zQYbqx9ANmIrUAGOSMONyDcduI1cnnt9Lu6JB-QEiC0fQ/exec';
const START_W = 138, GOAL_W = 90, CIRC = 490;

Chart.defaults.color = '#6B7D6C';
Chart.defaults.font.family = 'Outfit';

let allData = [];
let wChart, sChart, bChart;

async function loadData() {
  try {
    const res = await fetch(GAS_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('データ形式が正しくありません');
    allData = data.filter(d => d.date);
    if (allData.length === 0) throw new Error('データがまだありません。Health Auto Exportのエクスポートを確認してください。');
    renderDashboard();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const es = document.getElementById('error-screen');
    es.style.display = 'flex';
    document.getElementById('err-msg').textContent = e.message;
  }
}

function filterDays(arr, days) {
  if (!days) return arr;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  const cut = cutoff.toISOString().slice(0,10);
  return arr.filter(d => d.date >= cut);
}

function fmt(day) {
  const d = new Date(day + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function renderDashboard() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';

  const wData = allData.filter(d => d.weight != null);
  const sData = allData.filter(d => d.steps != null);
  const bData = allData.filter(d => d.bp_sys != null && d.bp_dia != null);

  const latest = wData[wData.length - 1];
  const prev   = wData[wData.length - 2];
  const curW   = latest ? parseFloat(latest.weight) : 0;
  const startW = wData[0] ? parseFloat(wData[0].weight) : START_W;
  const lost   = (startW - curW).toFixed(1);
  const remain = Math.max(curW - GOAL_W, 0).toFixed(1);
  const pct    = Math.min(((startW - curW) / (START_W - GOAL_W)) * 100, 100);

  // Ring
  document.getElementById('ring-weight').textContent = curW.toFixed(1);
  document.getElementById('lost-kg').textContent = lost >= 0 ? `▼${lost}` : `▲${Math.abs(lost)}`;
  document.getElementById('remain-kg').textContent = remain;
  document.getElementById('prog-pct').textContent = `達成率 ${pct.toFixed(1)}%`;
  setTimeout(() => {
    document.getElementById('ring-arc').style.strokeDashoffset = CIRC * (1 - pct/100);
    document.getElementById('prog-bar').style.width = pct.toFixed(1) + '%';
  }, 100);

  // Stat: weight
  document.getElementById('s-weight').textContent = curW.toFixed(1);
  if (prev) {
    const diff = (curW - parseFloat(prev.weight)).toFixed(1);
    const el = document.getElementById('s-weight-d');
    el.textContent = diff < 0 ? `前回比 ${diff} kg` : diff > 0 ? `前回比 +${diff} kg` : '前回と同じ';
    el.className = 'stat-delta ' + (diff < 0 ? 'good' : diff > 0 ? 'bad' : 'neutral');
  }

  // Stat: steps
  const ls = sData[sData.length-1];
  const ps = sData[sData.length-2];
  document.getElementById('s-steps').textContent = ls ? Math.round(ls.steps).toLocaleString() : '—';
  if (ls && ps) {
    const d = Math.round(ls.steps - ps.steps);
    const el = document.getElementById('s-steps-d');
    el.textContent = `前日比 ${d>=0?'+':''}${d.toLocaleString()} 歩`;
    el.className = 'stat-delta ' + (d >= 0 ? 'good' : 'bad');
  }

  // Stat: BP
  const lb = bData[bData.length-1];
  if (lb) {
    document.getElementById('s-sys').textContent = lb.bp_sys ?? '—';
    document.getElementById('s-dia').textContent = lb.bp_dia ?? '—';
    const el = document.getElementById('s-bp-comment');
    const sys = lb.bp_sys;
    if (sys >= 140) { el.textContent = '⚠ 高血圧域'; el.className = 'stat-delta bad'; }
    else if (sys >= 130) { el.textContent = '注意 高値血圧'; el.className = 'stat-delta neutral'; }
    else { el.textContent = '✓ 正常域'; el.className = 'stat-delta good'; }
  }

  // Sync info
  const last = allData[allData.length-1];
  document.getElementById('sync-info').textContent = `最終データ: ${last?.date ?? '—'}`;

  // Charts
  renderWeightChart(30);
  renderStepsChart();
  renderBpChart();
  renderTable();

  // Period pills
  document.getElementById('weight-pills').querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#weight-pills .pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderWeightChart(parseInt(btn.dataset.d));
    });
  });
}

function renderWeightChart(days) {
  const data = filterDays(allData.filter(d=>d.weight!=null), days);
  const labels = data.map(d => fmt(d.date));
  const vals = data.map(d => parseFloat(d.weight));
  if (wChart) wChart.destroy();
  wChart = new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label:'体重', data:vals, borderColor:'#6DB87A', backgroundColor:'rgba(109,184,122,0.07)', borderWidth:2, pointRadius:data.length>60?0:3, tension:0.4, fill:true },
      { label:'目標90kg', data:Array(labels.length).fill(GOAL_W), borderColor:'rgba(232,197,71,0.4)', borderWidth:1.5, borderDash:[6,4], pointRadius:0, fill:false }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{ x:{grid:{color:'#1E2820'},ticks:{maxTicksLimit:8}}, y:{grid:{color:'#1E2820'},min:Math.floor((Math.min(...vals,GOAL_W)-2)/5)*5} }
    }
  });
}

function renderStepsChart() {
  const data = filterDays(allData.filter(d=>d.steps!=null), 30);
  const labels = data.map(d => fmt(d.date));
  const vals = data.map(d => Math.round(d.steps));
  if (sChart) sChart.destroy();
  sChart = new Chart(document.getElementById('stepsChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label:'歩数', data:vals,
      backgroundColor: vals.map(v => v>=8000?'rgba(109,184,122,0.7)':v>=5000?'rgba(232,197,71,0.5)':'rgba(232,106,71,0.5)'),
      borderRadius:4 }]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{ x:{grid:{display:false},ticks:{maxTicksLimit:10}}, y:{grid:{color:'#1E2820'}} }
    }
  });
}

function renderBpChart() {
  const data = filterDays(allData.filter(d=>d.bp_sys!=null&&d.bp_dia!=null), 60);
  const labels = data.map(d => fmt(d.date));
  if (bChart) bChart.destroy();
  bChart = new Chart(document.getElementById('bpChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label:'最高血圧', data:data.map(d=>d.bp_sys), borderColor:'#E86A47', borderWidth:2, pointRadius:data.length>30?0:3, tension:0.3, fill:false },
      { label:'最低血圧', data:data.map(d=>d.bp_dia), borderColor:'#6DB87A', borderWidth:2, pointRadius:data.length>30?0:3, tension:0.3, fill:false },
      { label:'基準130', data:Array(labels.length).fill(130), borderColor:'rgba(232,197,71,0.3)', borderWidth:1, borderDash:[4,4], pointRadius:0, fill:false }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{boxWidth:12,padding:14,font:{size:11}}}},
      scales:{ x:{grid:{color:'#1E2820'},ticks:{maxTicksLimit:8}}, y:{grid:{color:'#1E2820'},suggestedMin:60,suggestedMax:160} }
    }
  });
}

function renderTable() {
  const rows = [...allData].reverse().slice(0, 50);
  const wArr = allData.filter(d=>d.weight!=null);
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map(r => {
    const wi = wArr.findIndex(d=>d.date===r.date);
    let diffHtml = '<td>—</td>';
    if (r.weight != null && wi > 0) {
      const d = (parseFloat(r.weight) - parseFloat(wArr[wi-1].weight)).toFixed(1);
      const cls = d < 0 ? 'down' : d > 0 ? 'up' : 'same';
      diffHtml = `<td class="td-d ${cls}">${d>0?'+':''}${d}</td>`;
    }
    const dt = new Date(r.date+'T00:00:00');
    const dateStr = `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`;
    return `<tr>
      <td>${dateStr}</td>
      <td class="td-w">${r.weight != null ? parseFloat(r.weight).toFixed(1) : '—'}</td>
      ${diffHtml}
      <td>${r.steps != null ? Math.round(r.steps).toLocaleString() : '—'}</td>
      <td style="font-size:13px;color:var(--sub)">${r.bp_sys != null ? `${r.bp_sys} / ${r.bp_dia}` : '—'}</td>
    </tr>`;
  }).join('');
}

loadData();
</script>
</body>
</html>
